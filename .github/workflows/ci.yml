name: Node.js CI with Docker Automation

# Trigger the workflow on pushes or pull requests to the main branch
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # Job 1: Install dependencies, build the source code, and run unit tests
  build_and_test:
    runs-on: ubuntu-latest

    # Run tests against multiple Node.js versions to ensure compatibility
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      # Step 1: Check out the repository code onto the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up the specific Node.js environment from the matrix
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm" # Caches npm dependencies for faster subsequent runs
          cache-dependency-path: "./package-lock.json"

      # Step 3: Install a clean slate of dependencies based on package-lock.json
      - name: Install dependencies
        run: npm ci

      # Step 4: Run the build script if it is defined in package.json
      - name: Build project
        run: npm run build --if-present

      # Step 5: Execute the unit test suite
      - name: Run tests
        run: npm test

  # Job 2: Build the Docker image and push it to Docker Hub
  # This job will ONLY run if the 'build_and_test' job completes successfully
  push_to_docker_hub:
    name: Push Docker Image
    needs: build_and_test
    runs-on: ubuntu-latest
    # Only push to Docker Hub during a direct push to main, not on Pull Requests
    if: github.event_name == 'push'

    steps:
      # Step 1: Check out the repository code again for the Docker build context
      - name: Check out the repo
        uses: actions/checkout@v4

      # Step 2: Authenticate with Docker Hub using repository secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Extract a 7-character short commit SHA to use as a unique image tag
      - name: Set short SHA
        id: vars
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      # Step 4: Build the Dockerfile and push the image tagged with the short SHA and 'latest'
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./
          push: true
          tags: |
            lahirusanjana/testing-agent:${{ env.SHORT_SHA }}
            lahirusanjana/testing-agent:latest